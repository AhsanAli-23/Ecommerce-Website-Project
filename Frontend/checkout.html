<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f4f6;
    padding:40px;
}

.checkout-container{
    max-width:1100px;
    margin:auto;
    display:flex;
    gap:40px;
}

/* LEFT SIDE FORM */
.checkout-form{
    flex:2;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.checkout-form h2{
    margin-bottom:25px;
}

.form-row{
    display:flex;
    gap:15px;
    margin-bottom:15px;
}

.form-row input{
    flex:1;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

input:focus, select:focus{
    outline:none;
    border-color:#3b82f6;
}

button{
    padding:14px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    width:100%;
    margin-top:15px;
    transition:0.3s;
}

button:hover{
    background:#2563eb;
}

/* RIGHT SIDE SUMMARY */
.order-summary{
    flex:1;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    height:fit-content;
}

.order-summary h3{
    margin-bottom:20px;
}

.summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:14px;
}

.total{
    border-top:1px solid #ddd;
    padding-top:15px;
    margin-top:15px;
    font-weight:bold;
    font-size:16px;
}
</style>

</head>

<body>

<div class="checkout-container">

    <!-- LEFT SIDE FORM -->
    <div class="checkout-form">
        <h2>Billing Details</h2>

        <form onsubmit="event.preventDefault(); placeOrder();">

            <div class="form-row">
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Last Name" required>
            </div>

            <input type="text" placeholder="Phone Number" required><br><br>

            <input type="text" placeholder="Address" required><br><br>

            <div class="form-row">
                <input type="text" placeholder="City" required>
                <input type="text" placeholder="Postal Code" required>
            </div>

            <select required>
                <option value="">Select Payment Method</option>
                <option>Cash on Delivery</option>
                <option>Credit Card</option>
            </select>

            <button type="submit">Place Order</button>

        </form>
    </div>

    <!-- RIGHT SIDE SUMMARY -->
    <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="summaryItems"></div>
        <div class="total" id="totalPrice"></div>
    </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let summaryDiv = document.getElementById("summaryItems");
let total = 0;

// Show cart summary
cart.forEach(item => {
    total += item.price * item.quantity;

    summaryDiv.innerHTML += `
        <div class="summary-item">
            <span>${item.name} x ${item.quantity}</span>
            <span>Rs. ${item.price * item.quantity}</span>
        </div>
    `;
});

document.getElementById("totalPrice").innerText = "Total: Rs. " + total;


// 🔥 PLACE ORDER (SEND TO BACKEND)
function placeOrder(){

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    const orderData = {
        customer: {
            firstName: document.querySelector("input[placeholder='First Name']").value,
            lastName: document.querySelector("input[placeholder='Last Name']").value,
            phone: document.querySelector("input[placeholder='Phone Number']").value,
            address: document.querySelector("input[placeholder='Address']").value,
            city: document.querySelector("input[placeholder='City']").value,
            postalCode: document.querySelector("input[placeholder='Postal Code']").value,
            paymentMethod: document.querySelector("select").value
        },
        items: cart.map(item => ({
            productId: item._id,
            name: item.name,
            price: item.price,
            quantity: item.quantity
        })),
        totalAmount: total
    };

    fetch("http://localhost:5000/api/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
    })
    .then(res => res.json())
    .then(data => {
        alert("Order Placed Successfully!");
        localStorage.removeItem("cart");
        window.location.href = "orders.html";
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Something went wrong!");
    });
}

</script>
</body>
</html>
